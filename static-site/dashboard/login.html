<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Login | Bytesized Journal</title>

        <link rel="icon" href="/icons/bytesized-orange.png" />

            <!-- The styles of the pages -->
            <!-- Global CSS -->
            <link rel="stylesheet" href="/styles/global/global.css" />
            <link rel="stylesheet" href="/styles/global/typography.css" />
            <link rel="stylesheet" href="/styles/global/components.css" />

            <!-- Layout CSS -->
            <link rel="stylesheet" href="/styles/flex.css" />

    </head>

    <body>

        <header class="flex space-between">

            <a href="../index.html">

                <h2>Bytesized Journal</h2>

            </a>

            <nav>

                <a href="../dashboard/dashboardHome.html">
                    Dashboard
                </a>

                <a href="../dashboard/calendar.html">
                    Calendar
                </a>

                <a href="../dashboard/settings.html">
                    Settings
                </a>
                
            </nav>

        </header>

        <main>

            <dialog id="error-modal" class="error-modal">

                <h3 id="error-heading"></h3>

                <p id="error-text"></p>

                <button id="close-error-modal">Close</button>

            </dialog>

            <dialog id="success-modal" class="success-modal">

                <h3 id="success-heading"></h3>

                <p id="success-text"></p>

                <button id="close-success-modal">Close</button>

            </dialog>

            <div class="text-container">

                <h1>Login</h1>

                <p>
                    Already have an account? Login to take advantage of your account features.
                </p>

            </div>

            <div class="card center-card flex flex-column">

                <label for="login-username">Username</label>
                <input id="login-username" type="text" placeholder="Username..." required />

                <label for="login-password-input">Password</label>
                <input id="login-password-input" type="password" placeholder="Password..." required />

                <button id="login-submit-button">Submit</button>

            </div>

        </main>
        
    </body>

    <script src="/dashboard/login/loginMainPageFile.js" type="module"></script>

</html>
